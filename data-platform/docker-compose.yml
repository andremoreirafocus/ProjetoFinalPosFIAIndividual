services:

  # ---------------------------------------------------------------------------
  # POSTGRES (Banco de dados compartilhado)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    shm_size: 2gb
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  # ---------------------------------------------------------------------------
  # AIRFLOW - INIT (Prepara o banco utilizando os comandos nativos da imagem)
  # ---------------------------------------------------------------------------
  airflow-init:
    build: ./airflow
    container_name: airflow-init
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      # Chave compartilhada para o airflow interagir entre os containers
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      # Variáveis nativas que criam automaticamente o usuário admin na inicialização do container
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      _AIRFLOW_WWW_USER_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      _AIRFLOW_WWW_USER_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
      _AIRFLOW_WWW_USER_ROLE: ${AIRFLOW_ADMIN_ROLE}
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
    command: >
      bash -c "mkdir -p /opt/airflow/data/csv /opt/airflow/Model/artifacts &&
      chmod -R ugo+rwX /opt/airflow/data /opt/airflow/Model/artifacts &&
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USERNAME} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role ${AIRFLOW_ADMIN_ROLE} --email ${AIRFLOW_ADMIN_EMAIL} --password ${AIRFLOW_ADMIN_PASSWORD} &&
      airflow pools set pool_ingestao ${POOL_INGESTAO_SIZE} 'Pool exclusivo para limitar o numero de tasks de ingestão simultaneas' &&
      airflow pools set pool_sanitization ${POOL_SANITIZATION_SIZE} 'Pool exclusivo para limitar o numero de tasks de sanitizacao simultaneas' &&
      airflow pools set pool_aggregation ${POOL_AGGREGATION_SIZE} 'Pool exclusivo para limitar o numero de tasks de agregacao simultaneas'"
    volumes:
      - ./Model:/opt/airflow/Model
      - ./airflow/data:/opt/airflow/data

  # ---------------------------------------------------------------------------
  # AIRFLOW - WEBSERVER (Interface Gráfica na porta 8080)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      # Chave compartilhada para o airflow interagir entre os containers
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    command: webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./DataPipeline:/opt/airflow/DataPipeline
      - ./Model:/opt/airflow/Model
      - ./airflow/data:/opt/airflow/data

  # ---------------------------------------------------------------------------
  # AIRFLOW - SCHEDULER (Executor e agendador das DAGs)
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      # Conexão com postgres SQL do banco Data -> Vai criar um CONN ID automatico
      AIRFLOW_CONN_POSTGRES_DATA_DB: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATA_DB}
      # Chave compartilhada para o airflow interagir entre os containers
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./DataPipeline:/opt/airflow/DataPipeline
      - ./Model:/opt/airflow/Model
      - ./airflow/data:/opt/airflow/data

  # ---------------------------------------------------------------------------
  # METABASE (Ferramenta de BI e Dashboards na porta 3000)
  # ---------------------------------------------------------------------------

  jupyter:
    build: ./jupyter
    container_name: jupyter_fia
    ports:
      - "8888:8888"
    volumes:
      - ./DataPipeline:/home/jovyan/work/DataPipeline
      - ./Model:/home/jovyan/work/Model
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DATA_DB=${POSTGRES_DATA_DB}
    # Altere para a mesma rede que o seu Postgres e Airflow usam:
    depends_on:
      - postgres

  # ---------------------------------------------------------------------------
  # MLOPS - API DE INFERÊNCIA
  # ---------------------------------------------------------------------------
  credit-api:
    build:
      context: .
      dockerfile: MLOps/Dockerfile.api
    ports:
      - "${CREDIT_API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATA_DB}
      MODEL_PATH: ${MODEL_PATH}
      MODEL_LOAD_RETRY_SECONDS: ${MODEL_LOAD_RETRY_SECONDS:-5}
      CREDIT_APPROVE_MAX_SCORE: ${CREDIT_APPROVE_MAX_SCORE}
      CREDIT_MANUAL_REVIEW_MAX_SCORE: ${CREDIT_MANUAL_REVIEW_MAX_SCORE}
      CREDIT_POLICY_VERSION: ${CREDIT_POLICY_VERSION}
    depends_on:
      - postgres
    volumes:
      - ./Model/artifacts:/app/Model/artifacts:ro

  # ---------------------------------------------------------------------------
  # MLOPS - INTERFACE DE DEMONSTRAÇÃO
  # ---------------------------------------------------------------------------
  credit-frontend:
    build:
      context: .
      dockerfile: MLOps/Dockerfile.frontend
    ports:
      - "${CREDIT_FRONTEND_PORT:-8501}:8501"
    environment:
      CREDIT_API_URL: http://credit-api:8000
    depends_on:
      - credit-api

volumes:
  pgdata:
