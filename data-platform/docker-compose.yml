services:

  # ---------------------------------------------------------------------------
  # POSTGRES (Banco de dados compartilhado)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    shm_size: 2gb
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  # ---------------------------------------------------------------------------
  # AIRFLOW - INIT (Prepara o banco utilizando os comandos nativos da imagem)
  # ---------------------------------------------------------------------------
  airflow-init:
    build: ./airflow
    container_name: airflow-init
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      # Chave compartilhada para o airflow interagir entre os containers
      AIRFLOW__WEBSERVER__SECRET_KEY: "tcc_fia_labdata_engenharia_dados"
      AIRFLOW__CORE__FERNET_KEY: "7777777777777777777777777777777777777777777="
      # Variáveis nativas que criam automaticamente o usuário admin na inicialização do container
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_ROLE: Admin
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
    command: >
      bash -c "mkdir -p /opt/airflow/data/csv /opt/airflow/Model/artifacts &&
      chmod -R ugo+rwX /opt/airflow/data /opt/airflow/Model/artifacts &&
      airflow db migrate &&
      airflow users create --username admin --firstname Airflow --lastname Admin --role Admin --email admin@example.com --password admin &&
      airflow pools set pool_ingestao 2 'Pool exclusivo para limitar a ingestão a 2 task por vez' &&
      airflow pools set pool_sanitization 2 'Pool exclusivo para limitar a sanitizacao a 2 task por vez' &&
      airflow pools set pool_aggregation 2 'Pool exclusivo para limitar a agregacao a 2 task por vez'"
    volumes:
      - ./Model:/opt/airflow/Model
      - ./airflow/data:/opt/airflow/data

  # ---------------------------------------------------------------------------
  # AIRFLOW - WEBSERVER (Interface Gráfica na porta 8080)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      # Chave compartilhada para o airflow interagir entre os containers
      AIRFLOW__WEBSERVER__SECRET_KEY: "tcc_fia_labdata_engenharia_dados"
      AIRFLOW__CORE__FERNET_KEY: "7777777777777777777777777777777777777777777="
    command: webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./DataPipeline:/opt/airflow/DataPipeline
      - ./Model:/opt/airflow/Model
      - ./airflow/data:/opt/airflow/data

  # ---------------------------------------------------------------------------
  # AIRFLOW - SCHEDULER (Executor e agendador das DAGs)
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      # Conexão com postgres SQL do banco Data -> Vai criar um CONN ID automatico
      AIRFLOW_CONN_POSTGRES_DATA_DB: "postgresql://airflow:airflow@postgres:5432/data"
      # Chave compartilhada para o airflow interagir entre os containers
      AIRFLOW__WEBSERVER__SECRET_KEY: "tcc_fia_labdata_engenharia_dados"
      AIRFLOW__CORE__FERNET_KEY: "7777777777777777777777777777777777777777777="
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./DataPipeline:/opt/airflow/DataPipeline
      - ./Model:/opt/airflow/Model
      - ./airflow/data:/opt/airflow/data

  # ---------------------------------------------------------------------------
  # METABASE (Ferramenta de BI e Dashboards na porta 3000)
  # ---------------------------------------------------------------------------

  jupyter:
    build: ./jupyter
    container_name: jupyter_fia
    ports:
      - "8888:8888"
    volumes:
      - ./DataPipeline:/home/jovyan/work/DataPipeline
      - ./Model:/home/jovyan/work/Model
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
    # Altere para a mesma rede que o seu Postgres e Airflow usam:
    depends_on:
      - postgres

  # ---------------------------------------------------------------------------
  # MLOPS - API DE INFERÊNCIA
  # ---------------------------------------------------------------------------
  credit-api:
    build:
      context: .
      dockerfile: MLOps/Dockerfile.api
    ports:
      - "${CREDIT_API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://airflow:airflow@postgres:5432/data
      MODEL_PATH: /app/Model/artifacts/lightgbm_abt.pkl
      MODEL_LOAD_RETRY_SECONDS: ${MODEL_LOAD_RETRY_SECONDS:-5}
      CREDIT_APPROVE_MAX_SCORE: ${CREDIT_APPROVE_MAX_SCORE}
      CREDIT_MANUAL_REVIEW_MAX_SCORE: ${CREDIT_MANUAL_REVIEW_MAX_SCORE}
      CREDIT_POLICY_VERSION: demo-v1
    depends_on:
      - postgres
    volumes:
      - ./Model/artifacts:/app/Model/artifacts:ro

  # ---------------------------------------------------------------------------
  # MLOPS - INTERFACE DE DEMONSTRAÇÃO
  # ---------------------------------------------------------------------------
  credit-frontend:
    build:
      context: .
      dockerfile: MLOps/Dockerfile.frontend
    ports:
      - "${CREDIT_FRONTEND_PORT:-8501}:8501"
    environment:
      CREDIT_API_URL: http://credit-api:8000
    depends_on:
      - credit-api

volumes:
  pgdata:
